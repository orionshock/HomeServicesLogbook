services:
  hsl:
    image: home-services-logbook:dev
    build:
      context: .
    container_name: hsl
    ports:
      - "8000:8000"
    environment:
      APP_DATA_DIR: /data
      APP_UPLOADS_DIR: /data/uploads
      APP_DB_PATH: /data/logbook.db
      APP_ROOT_PATH: ""
    volumes:
      - hsl_data:/data
    restart: unless-stopped

volumes:
  hsl_data: