{% extends "base.html" %}

{% block title %}Add Vendor — Home Services Logbook{% endblock %}

{% block content %}
<h1>Add Vendor</h1>

<section class="content-section">
    <form method="post" action="/vendors/new">
        <div class="form-field">
            <label for="name">Vendor Name *</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-field">
            <label for="category">Category</label>
            <input type="text" id="category" name="category" placeholder="e.g. ISP, HVAC, Plumber">
        </div>
        <div class="form-field">
            <label for="account_number">Account Number</label>
            <input type="text" id="account_number" name="account_number">
        </div>
        <div class="form-field">
            <label for="portal_url">Portal URL</label>
            <input type="text" id="portal_url" name="portal_url" placeholder="example.com or https://example.com" autocomplete="url" inputmode="url" title="Optional: enter example.com or a full http/https URL">
        </div>
        <div class="form-field">
            <label for="vendor_notes">Notes</label>
            <textarea id="vendor_notes" name="vendor_notes" rows="4"></textarea>
        </div>
        <div class="entry-actions">
            <button type="submit" class="btn btn-primary">Save Vendor</button>
            <a href="/vendors" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
