{% extends "base.html" %}

{% block title %}Edit {{ vendor.name }} — Home Services Logbook{% endblock %}

{% block content %}
<h1>Edit Vendor</h1>

<p>
    <a href="/vendor/{{ vendor.vendor_uid }}">Back to Vendor</a> |
    <a href="/vendors">Back to Vendors</a>
</p>

<section class="content-section vendor-edit-section">
    <form method="post" action="/vendor/{{ vendor.vendor_uid }}/edit">
        <div>
            <label for="name">Vendor Name *</label><br>
            <input type="text" id="name" name="name" required value="{{ vendor.name }}">
        </div>
        <div>
            <label for="category">Category</label><br>
            <input type="text" id="category" name="category" value="{{ vendor.category or '' }}">
        </div>
        <div>
            <label for="account_number">Account Number</label><br>
            <input type="text" id="account_number" name="account_number" value="{{ vendor.account_number or '' }}">
        </div>
        <div>
            <label for="name_on_account">Name on Account</label><br>
            <input type="text" id="name_on_account" name="name_on_account" value="{{ vendor.name_on_account or '' }}">
        </div>
        <div>
            <label for="portal_url">Portal URL</label><br>
            <input type="url" id="portal_url" name="portal_url" value="{{ vendor.portal_url or '' }}">
        </div>
        <div>
            <label for="portal_username">Portal Username</label><br>
            <input type="text" id="portal_username" name="portal_username" value="{{ vendor.portal_username or '' }}">
        </div>
        <div>
            <label for="phone_on_file">Phone on File</label><br>
            <input type="text" id="phone_on_file" name="phone_on_file" value="{{ vendor.phone_on_file or '' }}">
        </div>
        <div>
            <label for="security_pin">Security PIN</label><br>
            <input type="text" id="security_pin" name="security_pin" value="{{ vendor.security_pin or '' }}">
        </div>
        <div>
            <label for="service_location">Service Location</label><br>
            <input type="text" id="service_location" name="service_location" value="{{ vendor.service_location or '' }}">
        </div>
        <div>
            <label for="vendor_notes">Vendor Notes</label><br>
            <textarea id="vendor_notes" name="vendor_notes" rows="6" cols="70">{{ vendor.vendor_notes or '' }}</textarea>
        </div>
        <div>
            <button type="submit">Save Changes</button>
            <a href="/vendor/{{ vendor.vendor_uid }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
